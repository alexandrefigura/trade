# Sistema de Trading v5.3 - Configuração Profissional
# Baseado em recomendações técnicas para produção

# Modo de operação
debug_mode: false  # Mudar para false em produção

# Trading Principal
trading:
  symbol: "BTCUSDT"
  min_confidence: 0.65  # 65% conforme recomendado
  max_position_pct: 0.02  # 2% padrão, ajustado dinamicamente

# Análise Técnica
ta:
  # RSI - Configurações recomendadas
  rsi_period: 14  # Período mais longo para estabilidade
  rsi_buy_threshold: 25  # Sobrevenda clara
  rsi_sell_threshold: 75  # Sobrecompra clara
  rsi_confidence: 0.8
  
  # Moving Averages
  sma_short_period: 9
  sma_long_period: 21  # Período mais longo
  ema_short_period: 9
  ema_long_period: 21
  sma_cross_confidence: 0.75
  
  # Bollinger Bands
  bb_period: 20
  bb_std_dev: 2.0
  bb_confidence: 0.7
  
  # Pattern Detection
  pattern_confidence: 0.85
  
  # Thresholds de decisão
  buy_threshold: 0.4  # Mais conservador
  sell_threshold: 0.4

# Análise de Orderbook
orderbook:
  imbalance_threshold: 0.90  # 90% conforme recomendado
  min_cycles_before_trade: 3  # Delay mínimo
  depth_levels: 20
  
# Pesos dos Sinais - Balanceamento recomendado
signal_weights:
  technical: 0.40  # 40%
  orderbook: 0.40  # 40%
  ml: 0.20        # 20%

# Gestão de Risco - CRÍTICO
risk:
  # Stop Loss e Take Profit
  stop_loss_pct: 0.015  # 1.5%
  take_profit_pct: 0.025  # 2.5% (relação 1.67:1)
  trailing_stop_pct: 0.01  # 1% trailing
  
  # Volatilidade e Posicionamento
  max_volatility: 0.05  # 5% máximo
  volatility_thresholds:
    low: 0.01  # 1%
    high: 0.03  # 3%
  
  # Tamanho dinâmico de posição
  position_sizing:
    low_volatility_pct: 0.05  # 5% quando calmo
    normal_volatility_pct: 0.02  # 2% normal
    high_volatility_pct: 0.01  # 1% quando volátil
  
  # Proteções adicionais
  max_daily_loss: 0.02  # 2% stop diário
  max_drawdown: 0.10  # 10% drawdown máximo
  min_volume_24h: 1000000  # $1M volume mínimo

# Filtros de Mercado
filters:
  min_volume_multiplier: 1.5  # Volume 50% acima da média
  max_spread_bps: 20  # 20 basis points máximo
  max_recent_volatility: 0.03  # 3% volatilidade recente

# Machine Learning
ml:
  enabled: true
  retrain_period_days: 14  # Retreinar a cada 2 semanas
  min_accuracy: 0.55  # 55% precisão mínima
  features:
    - rsi
    - volume_ratio
    - atr
    - momentum
    - volatility
    - spread_bps
    - orderbook_imbalance
  
# Performance e Timing
performance:
  ta_interval_ms: 5000  # Análise a cada 5s
  main_loop_interval_ms: 1000  # Loop principal 1s
  orderbook_update_ms: 100  # Orderbook 100ms
  
# Cache e Infraestrutura
infrastructure:
  use_redis: true
  redis_host: "localhost"
  redis_port: 6379
  redis_timeout: 5
  websocket_reconnect_delay: 5
  max_reconnect_attempts: 10

# Sistema de Alertas
alerts:
  enabled: true
  channels:
    telegram:
      enabled: true
      bot_token: "${TELEGRAM_BOT_TOKEN}"  # Usar variável de ambiente
      chat_id: "${TELEGRAM_CHAT_ID}"
      alert_types:
        - trade_opened
        - trade_closed
        - stop_loss_hit
        - daily_summary
        - errors
    email:
      enabled: false
      smtp_server: "smtp.gmail.com"
      smtp_port: 587
      from_email: "trading@example.com"
      to_email: "alerts@example.com"

# Validação de Mercado
market_validation:
  check_interval: 60  # Verificar a cada 60s
  required_checks:
    - volume_above_average
    - spread_acceptable
    - volatility_in_range
    - orderbook_depth_sufficient
  min_orderbook_depth: 10  # Mínimo 10 níveis

# Configurações de Debug/Desenvolvimento
debug:
  force_first_trade: false
  use_simulated_data: false
  save_all_signals: true
  log_orderbook_changes: false

# Backtesting - APRIMORADO
backtesting:
  # Configurações básicas
  default_period_days: 30
  
  # Simulação realista de custos
  commission:
    maker_fee_pct: 0.0002  # 0.02% para ordens maker
    taker_fee_pct: 0.0004  # 0.04% para ordens taker
    funding_rate_pct: 0.0001  # Taxa de financiamento para posições overnight
  
  # Slippage dinâmico baseado em condições de mercado
  slippage:
    base_pct: 0.0005  # 0.05% slippage base
    high_volatility_multiplier: 3.0  # 3x durante alta volatilidade
    low_liquidity_multiplier: 2.0  # 2x quando baixa liquidez
    max_slippage_pct: 0.003  # 0.3% máximo permitido
    
  # Walk-forward analysis
  walk_forward:
    enabled: true
    train_days: 30  # Janela de treinamento
    validation_days: 7  # Janela de validação
    step_days: 1  # Avançar 1 dia por vez
    min_train_samples: 1000  # Mínimo de amostras para treinar
    reoptimize_interval: 7  # Re-otimizar a cada 7 dias
    
  # Métricas de avaliação
  metrics:
    primary: "sharpe_ratio"  # Métrica principal para otimização
    secondary:
      - "max_drawdown"
      - "win_rate"
      - "profit_factor"
      - "calmar_ratio"
      - "sortino_ratio"
    
  # Simulação de condições reais
  realistic_simulation:
    partial_fills: true  # Simular preenchimento parcial de ordens
    reject_rate: 0.01  # 1% de ordens rejeitadas
    latency_ms: 50  # Latência de 50ms
    market_impact_model: "square_root"  # Modelo de impacto de mercado
    
# Otimização de Hiperparâmetros - NOVO
hyperopt:
  enabled: true
  engine: "optuna"  # Optuna ou hyperopt
  
  # Configurações do Optuna
  optuna:
    study_name: "trading_optimization"
    n_trials: 100  # Número de tentativas
    direction: "maximize"  # maximize retorno ou sharpe_ratio
    objective: "sharpe_ratio"  # Métrica a otimizar
    sampler: "TPESampler"  # Algoritmo de sampling
    pruner: "MedianPruner"  # Poda de trials ruins
    
  # Espaço de busca dos hiperparâmetros
  search_space:
    # Parâmetros de TA
    rsi_period:
      type: "int"
      low: 10
      high: 30
      step: 2
    rsi_buy_threshold:
      type: "float"
      low: 20
      high: 40
      step: 5
    rsi_sell_threshold:
      type: "float"
      low: 60
      high: 80
      step: 5
      
    # Parâmetros de MA
    sma_short_period:
      type: "int"
      low: 5
      high: 15
      step: 1
    sma_long_period:
      type: "int"
      low: 15
      high: 50
      step: 5
      
    # Parâmetros de risco
    stop_loss_pct:
      type: "float"
      low: 0.005
      high: 0.03
      step: 0.005
    take_profit_pct:
      type: "float"
      low: 0.01
      high: 0.05
      step: 0.005
      
    # Pesos dos sinais
    signal_weight_technical:
      type: "float"
      low: 0.2
      high: 0.6
      step: 0.1
    signal_weight_orderbook:
      type: "float"
      low: 0.2
      high: 0.6
      step: 0.1
    signal_weight_ml:
      type: "float"
      low: 0.1
      high: 0.4
      step: 0.1
      
    # Parâmetros de orderbook
    orderbook_imbalance_threshold:
      type: "float"
      low: 0.80
      high: 0.95
      step: 0.05
      
  # Restrições de otimização
  constraints:
    - "signal_weights_sum_to_one"  # Soma dos pesos = 1
    - "stop_loss_less_than_take_profit"  # SL < TP
    - "ma_short_less_than_long"  # MA curta < MA longa
    
  # Configurações de persistência
  persistence:
    save_best_params: true
    params_file: "best_hyperparameters.json"
    save_all_trials: true
    trials_database: "sqlite:///optuna_trials.db"
    
  # Otimização adaptativa em produção
  adaptive_optimization:
    enabled: true
    reoptimize_days: 7  # Re-otimizar semanalmente
    min_performance_drop: 0.15  # Re-otimizar se performance cair 15%
    use_online_learning: true  # Ajuste contínuo de parâmetros
    
# Checkpoints e Recovery
checkpoint:
  interval_seconds: 300  # Salvar a cada 5 min
  max_checkpoints: 10
  compression: true
  
# Monitoramento de Performance
monitoring:
  track_parameter_drift: true  # Detectar mudanças nos parâmetros ótimos
  alert_on_regime_change: true  # Alertar mudanças de regime de mercado
  performance_window_days: 7  # Janela para avaliar performance